name: Update S&P 500 fundamentals

on:
  workflow_dispatch:
  schedule:
    # Fundamentals and analyst estimates change slowly. Weekly refresh avoids hammering Yahoo.
    - cron: "30 10 * * 6"

permissions:
  contents: write

jobs:
  update-fundamentals:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas yfinance

      - name: Download fundamentals and estimates
        run: python scripts/update_fundamentals.py

      - name: Commit updated fundamentals file
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add fundamentals/latest_fundamentals.csv
          git diff --cached --quiet || git commit -m "Update S&P 500 fundamentals"
          git push
