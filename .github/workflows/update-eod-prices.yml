name: Update S&P 500 EOD prices

on:
  workflow_dispatch:
  schedule:
    # Runs after the U.S. market close on weekdays. Adjust if you want a different refresh time.
    - cron: "30 23 * * 1-5"

permissions:
  contents: write

jobs:
  update-eod-prices:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas yfinance

      - name: Download EOD prices
        run: python scripts/update_eod_prices.py

      - name: Commit updated price file
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add prices/latest_prices.csv
          git diff --cached --quiet || git commit -m "Update S&P 500 EOD prices"
          git push
